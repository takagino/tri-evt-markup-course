<!doctype html>
<html lang="ja">
  <head>

    <title>①タイトルを変更してください</title>
    <!-- font awesome (https://fontawesome.com/search?ic=free-collection) -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"

    <link rel="stylesheet" href="base.css" />
    <style>
      /*
      ③CSS (Cascading Style Sheets)
      Webサイトを「カッコよく」「可愛く」するための場所。
      HTMLで作った骨組みに、色を塗ったり、サイズを変えたりします。
      */
      body {
        background-color: #333;
        color: #fff;
      }

      h2 {
        border-bottom: 1px dotted;
      }
    </style>
  </head>
  <body>
    <!--
    ②HTML (HyperText Markup Language)
    ページに表示したい文章や画像を「置く」場所。
    文章に「ページ内でどんな意味を持つのか」を示す印をつけていきます。
    -->
    <h1>トライデントコンピュータ専門学校</h1>
    <img src="images/mainvisual.jpg" alt="パトラくん" />
    <p>
      トライデントがめざすのは、企業で「即戦力」としてのみ重宝される人材の育成ではありません。独自の教育を通じて、生涯にわたりその企業を、さらには業界を牽引していくことのできるマネージャー・リーダーを輩出することが、真の目標です。
    </p>
    <h2>学科リスト</h2>
    <ul>
      <li>Webデザイン学科</li>
      <li>ゲームサイエンス学科</li>

      <li>サイバーセキュリティ学科</li>
      <li>高度情報学科</li>
      <li>情報処理学科</li>
      <li>情報キャリアプロ学科 [再進学コース]</li>
    </ul>
    <a href="https://computer.trident.ac.jp/"
      ><i class="fa-solid fa-link"></i> 公式サイトへ</a
    >
  </body>
</html>
